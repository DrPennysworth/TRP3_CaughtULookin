name: Package and publish TRP3_CaughtULookin

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Release version number (example: 1.0.0)'
        required: true
        default: '1.0.0'
      release_body:
        description: 'Release notes'
        required: false
        default: 'Packaged TRP3_CaughtULookin addon release.'
      prerelease:
        description: 'Mark this release as prerelease'
        required: false
        default: 'false'

jobs:
  package-and-release:
    name: Package and publish addon
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Create addon package zip
        run: |
          rm -f TRP3_CaughtULookin-v${{ github.event.inputs.version_number }}.zip
          zip -r TRP3_CaughtULookin-v${{ github.event.inputs.version_number }}.zip TRP3_CaughtULookin

      - name: Create GitHub release and upload package
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ github.event.inputs.version_number }}
          name: TRP3_CaughtULookin v${{ github.event.inputs.version_number }}
          body: ${{ github.event.inputs.release_body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          files: TRP3_CaughtULookin-v${{ github.event.inputs.version_number }}.zip
